<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Popup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      /* Ensure popup width is set before React/CSS loads */
      html, body {
        margin: 0;
        padding: 0;
        width: 600px; /* Increase popup width */
        min-height: 420px;
        overflow: hidden;
        box-sizing: border-box;
      }
    </style>
  </head>

  <body>
    <div id="app-container"></div>
  </body>
</html>
